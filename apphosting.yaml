# Firebase App Hosting — gobookme
# https://firebase.google.com/docs/app-hosting/configure
#
# Deploy: firebase apphosting:backends:create (one-time)
# Then every push to the connected GitHub branch auto-deploys.

runConfig:
  runtime: nodejs22
  concurrency: 80
  minInstances: 1
  maxInstances: 50
  cpu: 2
  memoryMiB: 4096

env:
  # ── Build-time only ─────────────────────────────────────────────────────────
  - variable: BUILD_STANDALONE
    value: "true"
    availability:
      - BUILD

  - variable: NODE_OPTIONS
    value: "--max-old-space-size=4096"
    availability:
      - BUILD

  - variable: SENTRY_AUTH_TOKEN
    value: ""
    availability:
      - BUILD

  # ── Public / non-sensitive runtime + build ──────────────────────────────────
  - variable: NEXT_PUBLIC_APP_NAME
    value: gobookme
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_COMPANY_NAME
    value: "gobookme, Inc."
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SUPPORT_MAIL_ADDRESS
    value: help@gobookme.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_DISABLE_SIGNUP
    value: ""
    availability:
      - BUILD
      - RUNTIME

  - variable: CALCOM_TELEMETRY_DISABLED
    value: "1"
    availability:
      - BUILD
      - RUNTIME

  - variable: TZ
    value: UTC
    availability:
      - BUILD
      - RUNTIME

  - variable: CRON_ENABLE_APP_SYNC
    value: "false"
    availability:
      - RUNTIME

  - variable: ENABLE_ASYNC_TASKER
    value: "false"
    availability:
      - RUNTIME

  # These are public-facing URLs — not sensitive, but must be set before first deploy.
  # Replace with your actual domain (or Firebase App Hosting URL initially).
  - variable: NEXTAUTH_URL
    value: https://gobookme.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_WEBAPP_URL
    value: https://gobookme.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_WEBSITE_URL
    value: https://gobookme.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_EMBED_LIB_URL
    value: https://gobookme.app/embed/embed.js
    availability:
      - BUILD
      - RUNTIME

  - variable: ALLOWED_HOSTNAMES
    value: '"gobookme.app"'
    availability:
      - RUNTIME

  # ── Secrets (stored in Google Cloud Secret Manager) ─────────────────────────
  # Create each secret once:
  #   echo -n "value" | gcloud secrets create SECRET_NAME --data-file=-
  #
  # SECURITY: DATABASE_URL is RUNTIME only — credentials must never appear in
  # build layers/artifacts. Prisma generates types from schema, not live DB.

  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME

  - variable: DATABASE_DIRECT_URL
    secret: DATABASE_DIRECT_URL
    availability:
      - RUNTIME

  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET
    availability:
      - RUNTIME

  - variable: CALENDSO_ENCRYPTION_KEY
    secret: CALENDSO_ENCRYPTION_KEY
    availability:
      - RUNTIME

  - variable: GOOGLE_API_CREDENTIALS
    secret: GOOGLE_API_CREDENTIALS
    availability:
      - RUNTIME

  - variable: GOOGLE_CALENDAR_API_KEY
    secret: GOOGLE_CALENDAR_API_KEY
    availability:
      - RUNTIME

  # Cron auth — routes accept either CRON_API_KEY (plain) or Bearer CRON_SECRET
  - variable: CRON_API_KEY
    secret: CRON_API_KEY
    availability:
      - RUNTIME

  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME

  # Email (Sendgrid)
  - variable: SENDGRID_API_KEY
    secret: SENDGRID_API_KEY
    availability:
      - RUNTIME

  - variable: SENDGRID_EMAIL
    secret: SENDGRID_EMAIL
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_SENDGRID_SENDER_NAME
    secret: NEXT_PUBLIC_SENDGRID_SENDER_NAME
    availability:
      - BUILD
      - RUNTIME

  # Stripe
  - variable: STRIPE_CLIENT_ID
    secret: STRIPE_CLIENT_ID
    availability:
      - RUNTIME

  - variable: STRIPE_PRIVATE_KEY
    secret: STRIPE_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_STRIPE_PUBLIC_KEY
    secret: NEXT_PUBLIC_STRIPE_PUBLIC_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME

  - variable: PAYMENT_FEE_FIXED
    secret: PAYMENT_FEE_FIXED
    availability:
      - RUNTIME

  - variable: PAYMENT_FEE_PERCENTAGE
    secret: PAYMENT_FEE_PERCENTAGE
    availability:
      - RUNTIME

  # Firebase SDK (public keys — stored as secrets to keep them out of source control
  # even though they are not truly secret; they're safe to expose in browsers)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
    availability:
      - RUNTIME

  # Email fallback (SMTP — if not using Sendgrid)
  - variable: EMAIL_FROM
    secret: EMAIL_FROM
    availability:
      - RUNTIME

  - variable: EMAIL_SERVER_HOST
    secret: EMAIL_SERVER_HOST
    availability:
      - RUNTIME

  - variable: EMAIL_SERVER_PORT
    secret: EMAIL_SERVER_PORT
    availability:
      - RUNTIME

  - variable: EMAIL_SERVER_USER
    secret: EMAIL_SERVER_USER
    availability:
      - RUNTIME

  - variable: EMAIL_SERVER_PASSWORD
    secret: EMAIL_SERVER_PASSWORD
    availability:
      - RUNTIME
